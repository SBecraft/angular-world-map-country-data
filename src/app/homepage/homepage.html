<div class="page-header">
  <h1>Interactive World Map</h1>
</div>

<div class="layout">
  <!-- left column: interactive svg world map -->  
  <div class="left-column">
    <p class="map-instruction">Click on a country to view its information.</p>
    <app-world-map (countrySelected)="loadCountry($event)"></app-world-map>
  </div>

  <div class="divider"></div>

  <!-- right column: static reference map and country data section -->  
  <div class="right-column">

    <div class="static-map-section">
      <p class="reference-label">For Reference Only</p>
      <img
        src="static-world-map.gif"
        alt="Static World Map Reference"
        class="static-map">
    </div>

    <div class="country-info-section">
      <app-country-data
        [country]="selectedCountry"
        [loading]="loading"
        [error]="error">
      </app-country-data>
    </div>

  </div>
</div>
